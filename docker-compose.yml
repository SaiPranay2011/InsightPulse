version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: insightpulse
      POSTGRES_PASSWORD: password
      POSTGRES_DB: insightpulse_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - insightpulse
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insightpulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - insightpulse
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  insightpulse:
    driver: bridge