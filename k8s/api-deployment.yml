apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: insightpulse
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: ghcr.io/your-org/insightpulse/api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5228
        env:
        - name: ASPNETCORE_ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: insightpulse-config
              key: ASPNETCORE_ENVIRONMENT
        - name: ConnectionStrings__DefaultConnection
          value: "Server=postgres;Port=5432;Database=insightpulse_prod;User Id=postgres;Password=$(DB_PASSWORD);"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: insightpulse-secrets
              key: db-password
        - name: ConnectionStrings__Redis
          value: "redis:6379,password=$(REDIS_PASSWORD)"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: insightpulse-secrets
              key: redis-password
        - name: Jwt__Key
          valueFrom:
            secretKeyRef:
              name: insightpulse-secrets
              key: jwt-key
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: insightpulse
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5228