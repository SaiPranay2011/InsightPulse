apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: insightpulse
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s``
      evaluation_interval: 15s
    scrape_configs:
    - job_name: 'api'
      static_configs:
      - targets: ['api-service:80']
    - job_name: 'postgres'
      static_configs:
      - targets: ['postgres-exporter:9187']
    - job_name: 'redis'
      static_configs:
      - targets: ['redis-exporter:9121']