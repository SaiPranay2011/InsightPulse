apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: insightpulse-ingress
  namespace: insightpulse
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - insightpulse.com
    - www.insightpulse.com
    - api.insightpulse.com
    secretName: insightpulse-tls
  rules:
  - host: insightpulse.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
  - host: www.insightpulse.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
  - host: api.insightpulse.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-service
            port:
              number: 80