# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

name: insightpulse

services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: insightpulse_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - insightpulse
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - insightpulse
    restart: unless-stopped
    healthcheck:
      # Use CMD-SHELL so the shell expands $REDIS_PASSWORD at runtime.
      # Compose does NOT interpolate ${VAR} inside the CMD array form.
      test: ["CMD-SHELL", "redis-cli -a $REDIS_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/saipranay2011/insightpulse/api:latest
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # ASP.NET Core maps Jwt__Key -> Configuration["Jwt:Key"]
      Jwt__Key: ${JWT_SECRET_KEY}
      Jwt__Issuer: insightpulse
      Jwt__Audience: insightpulse-users
      Jwt__ExpirationMinutes: 1440
      ConnectionStrings__DefaultConnection: "Server=postgres;Port=5432;Database=insightpulse_prod;User Id=postgres;Password=${DB_PASSWORD};"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD}"
    ports:
      - "5228:5228"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - insightpulse
    restart: unless-stopped
    healthcheck:
      # wget is available in mcr.microsoft.com/dotnet/aspnet — curl is not.
      test: ["CMD-SHELL", "wget -qO- http://localhost:5228/api/health > /dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 60s

  frontend:
    image: ghcr.io/saipranay2011/insightpulse/frontend:latest
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - insightpulse
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:

networks:
  insightpulse:
    driver: bridge