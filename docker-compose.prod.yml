# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

name: insightpulse

services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: insightpulse_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - insightpulse
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - insightpulse
    restart: unless-stopped
    healthcheck:
      # CMD-SHELL is required — compose does not interpolate ${VAR} inside the
      # CMD array form, so redis-cli would receive the literal string "${REDIS_PASSWORD}".
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/saipranay2011/insightpulse/api:latest
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=postgres;Port=5432;Database=insightpulse_prod;User Id=postgres;Password=${DB_PASSWORD};"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD}"
      Jwt__Key: ${JWT_SECRET_KEY}
      Jwt__Issuer: insightpulse
      Jwt__Audience: insightpulse-users
      Jwt__ExpirationMinutes: "1440"
      # Inject allowed CORS origins so Program.cs can read them without hardcoding the IP.
      Cors__AllowedOrigins__0: "http://${DEPLOY_HOST}:3000"
      Cors__AllowedOrigins__1: "https://${DEPLOY_HOST}:3000"
      Cors__AllowedOrigins__2: "http://${DEPLOY_HOST}"
      Cors__AllowedOrigins__3: "https://${DEPLOY_HOST}"
    ports:
      - "5228:5228"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - insightpulse
    restart: unless-stopped
    healthcheck:
      # curl is explicitly installed in the API Dockerfile (aspnet:9.0 does not
      # include curl or wget by default — the image is debian:bookworm-slim).
      test: ["CMD", "curl", "-f", "http://localhost:5228/api/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      # start_period gives the app time to run migrations before healthcheck
      # failures count. 6 retries × 5 s backoff + migration time ≈ 90 s max.
      start_period: 90s

  frontend:
    image: ghcr.io/saipranay2011/insightpulse/frontend:latest
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - insightpulse
    restart: unless-stopped
    healthcheck:
      # node:20-alpine includes wget but not curl
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
  redis_data:

networks:
  insightpulse:
    driver: bridge