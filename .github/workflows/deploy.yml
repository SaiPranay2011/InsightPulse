# yaml-language-server: $schema=https://json.schemastore.org/github-workflow
name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore InsightPulse.API/

    - name: Build
      run: dotnet build InsightPulse.API/ --no-restore --configuration Release

    - name: Run tests
      run: dotnet test InsightPulse.API/ --no-build --verbosity normal || true

  test-frontend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Install dependencies
      run: cd frontend && npm ci

    - name: Build
      run: cd frontend && npm run build

  build-and-push:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Convert image name to lowercase
      id: image
      run: echo "image_name=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

    - name: Build and push backend
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./InsightPulse.API/Dockerfile
        push: true
        tags: ${{ env.REGISTRY }}/${{ steps.image.outputs.image_name }}/api:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push frontend
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: true
        tags: ${{ env.REGISTRY }}/${{ steps.image.outputs.image_name }}/frontend:latest
        build-args: |
          NEXT_PUBLIC_API_URL=http://${{ secrets.DEPLOY_HOST }}:5228/api
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v3

    - name: Deploy to production
      env:
        DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      run: |
        mkdir -p ~/.ssh
        echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
        
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
          $DEPLOY_USER@$DEPLOY_HOST << 'DEPLOY_COMMANDS'
        
        set -e
        cd /app/insightpulse
        
        echo "===== Deployment Started ====="
        
        # Create .env.prod with secrets (on server only, not in git)
        echo "Creating .env.prod..."
        cat > .env.prod << 'ENVFILE'
        DB_PASSWORD=$DB_PASSWORD
        REDIS_PASSWORD=$REDIS_PASSWORD
        JWT_SECRET_KEY=$JWT_SECRET_KEY
        ENVFILE
        chmod 600 .env.prod
        echo "✓ Environment file created"
        
        # Pull latest code
        echo "Pulling latest code..."
        git pull origin main || git clone https://github.com/SaiPranay2011/InsightPulse.git .
        echo "✓ Code pulled"
        
        # Verify .env.prod still exists (git pull shouldn't remove it)
        if [ ! -f .env.prod ]; then
          echo "ERROR: .env.prod missing!"
          exit 1
        fi
        
        # Login to Docker
        echo "Logging into Docker..."
        echo "$GITHUB_TOKEN" | docker login -u SaiPranay2011 --password-stdin ghcr.io || true
        echo "✓ Docker login complete"
        
        # Pull images
        echo "Pulling Docker images..."
        docker-compose -f docker-compose.prod.yml pull
        echo "✓ Images pulled"
        
        # Stop old services
        echo "Stopping old services..."
        docker-compose -f docker-compose.prod.yml down || true
        echo "✓ Old services stopped"
        
        # Clean Docker
        echo "Cleaning Docker resources..."
        docker system prune -af > /dev/null
        echo "✓ Docker cleaned"
        
        # CRITICAL: Load environment variables BEFORE docker-compose
        echo "Loading environment variables..."
        set -a
        source .env.prod
        set +a
        echo "✓ Environment variables loaded"
        
        # Start services with env vars available
        echo "Starting services..."
        docker-compose -f docker-compose.prod.yml up -d
        echo "✓ Services started"
        
        # Wait for services
        echo "Waiting 90 seconds for services to stabilize..."
        sleep 90
        
        # Run migrations
        echo "Running database migrations..."
        docker-compose -f docker-compose.prod.yml exec -T api \
          sh -c 'cd /app/InsightPulse.API && dotnet ef database update --no-build' || true
        echo "✓ Migrations complete"
        
        # Check status
        echo ""
        echo "Service Status:"
        docker-compose -f docker-compose.prod.yml ps
        
        # Test API
        echo ""
        echo "Testing API health..."
        curl -s http://localhost:5228/api/health || echo "API not ready yet"
        
        echo ""
        echo "===== Deployment Complete ====="
        echo "Frontend: http://3.22.167.100:3000"
        echo "API: http://3.22.167.100:5228/api/health"
        
        DEPLOY_COMMANDS