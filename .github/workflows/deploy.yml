# yaml-language-server: $schema=https://json.schemastore.org/github-workflow
name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Backend tests ─────────────────────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore InsightPulse.slnx

    - name: Build
      run: dotnet build InsightPulse.slnx --no-restore --configuration Release

    - name: Run tests
      run: dotnet test InsightPulse.slnx --no-build --verbosity normal || true

  # ── Frontend tests ────────────────────────────────────────────────────────────
  test-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Install dependencies
      run: cd frontend && npm ci

    - name: Build
      run: cd frontend && npm run build
      env:
        # Provide a dummy URL so NEXT_PUBLIC_API_URL is defined during CI build.
        # The real value is baked in at image-build time via the Docker build ARG.
        NEXT_PUBLIC_API_URL: http://localhost:5228/api

  # ── Build & push Docker images ────────────────────────────────────────────────
  build-and-push:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Normalise image name to lowercase
      id: image
      run: |
        echo "image_name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

    - name: Build and push API image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./InsightPulse.API/Dockerfile
        push: true
        tags: ${{ env.REGISTRY }}/${{ steps.image.outputs.image_name }}/api:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push frontend image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: true
        tags: ${{ env.REGISTRY }}/${{ steps.image.outputs.image_name }}/frontend:latest
        # NEXT_PUBLIC_API_URL must be a build ARG — next build inlines it into the
        # JS bundle at compile time, so setting it as a runtime ENV has no effect.
        build-args: |
          NEXT_PUBLIC_API_URL=http://${{ secrets.DEPLOY_HOST }}:5228/api
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # ── Deploy ────────────────────────────────────────────────────────────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v3

    - name: Deploy to production
      env:
        DEPLOY_KEY:     ${{ secrets.DEPLOY_KEY }}
        DEPLOY_HOST:    ${{ secrets.DEPLOY_HOST }}
        DEPLOY_USER:    ${{ secrets.DEPLOY_USER }}
        DB_PASSWORD:    ${{ secrets.DB_PASSWORD }}
        REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      run: |
        mkdir -p ~/.ssh
        echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

        # Write .env.prod here on the Actions runner where secrets are already
        # expanded as shell variables.  Using an unquoted EOF heredoc means the
        # variables ARE substituted.  The file is then scp-d to the server.
        #
        # This avoids the original bug: the old code wrote .env.prod inside
        # << 'DEPLOY_COMMANDS' (quoted marker), which is a nested quoted heredoc.
        # Bash treats everything inside a quoted heredoc literally — so the file
        # contained the text "$JWT_SECRET_KEY" rather than the actual secret,
        # causing the zero-length JWT key crash on every request.
        cat > /tmp/env_prod << ENVEOF
        DB_PASSWORD=${DB_PASSWORD}
        REDIS_PASSWORD=${REDIS_PASSWORD}
        JWT_SECRET_KEY=${JWT_SECRET_KEY}
        DEPLOY_HOST=${DEPLOY_HOST}
        ENVEOF
        chmod 600 /tmp/env_prod

        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
          "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p /app/insightpulse"

        scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
          /tmp/env_prod "$DEPLOY_USER@$DEPLOY_HOST:/app/insightpulse/.env.prod"

        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
          "$DEPLOY_USER@$DEPLOY_HOST" << 'DEPLOY_COMMANDS'

        set -e
        cd /app/insightpulse

        echo "===== Deployment Started ====="

        echo "Pulling latest code..."
        if [ -d .git ]; then
          git pull origin main
        else
          git clone https://github.com/SaiPranay2011/InsightPulse.git .
        fi
        echo "Code pulled."

        if [ ! -f .env.prod ]; then
          echo "ERROR: .env.prod missing after git pull — aborting"
          exit 1
        fi

        set -a
        source .env.prod
        set +a
        echo "Environment variables loaded."

        DC="docker compose"
        docker compose version >/dev/null 2>&1 || DC="docker-compose"

        echo "Pulling Docker images..."
        $DC -f docker-compose.prod.yml pull
        echo "Images pulled."

        echo "Stopping old services..."
        $DC -f docker-compose.prod.yml down --remove-orphans || true

        echo "Starting services..."
        $DC -f docker-compose.prod.yml up -d
        echo "Services started."

        # DB migrations run automatically on API startup via db.MigrateAsync()
        # in Program.cs — no separate "dotnet ef database update" step needed.

        echo "Waiting for API to become healthy (up to 4 min)..."
        for i in $(seq 1 24); do
          if curl -sf http://localhost:5228/api/health > /dev/null 2>&1; then
            echo "API is healthy (attempt $i)."
            break
          fi
          if [ "$i" -eq 24 ]; then
            echo "WARNING: API did not become healthy in time. Last logs:"
            $DC -f docker-compose.prod.yml logs --tail=50 api
          fi
          echo "  Attempt $i/24 — retrying in 10s..."
          sleep 10
        done

        echo ""
        $DC -f docker-compose.prod.yml ps

        echo ""
        echo "===== Deployment Complete ====="
        echo "Frontend : http://$DEPLOY_HOST:3000"
        echo "API      : http://$DEPLOY_HOST:5228/api/health"

        DEPLOY_COMMANDS