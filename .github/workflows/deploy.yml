# yaml-language-server: $schema=https://json.schemastore.org/github-workflow
name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore InsightPulse.API/

    - name: Build
      run: dotnet build InsightPulse.API/ --no-restore --configuration Release

    - name: Run tests
      run: dotnet test InsightPulse.API/ --no-build --verbosity normal || true

  test-frontend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Install dependencies
      run: cd frontend && npm ci

    - name: Build
      run: cd frontend && npm run build

    - name: Run linter
      run: cd frontend && npm run lint || true

  build-and-push:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Convert image name to lowercase
      id: image
      run: echo "image_name=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

    - name: Build and push backend
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./InsightPulse.API/Dockerfile
        push: true
        tags: ${{ env.REGISTRY }}/${{ steps.image.outputs.image_name }}/api:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push frontend
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: true
        tags: ${{ env.REGISTRY }}/${{ steps.image.outputs.image_name }}/frontend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v3

    - name: Deploy to production
      env:
        DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      run: |
        mkdir -p ~/.ssh
        echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
        
        ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST << 'DEPLOY_SCRIPT'
          set -e
          
          echo "===== Starting Deployment ====="
          
          # Ensure permissions
          sudo chown -R $DEPLOY_USER:$DEPLOY_USER /app/insightpulse || true
          sudo chmod -R 755 /app/insightpulse || true
          
          cd /app/insightpulse
          
          # CRITICAL: Create .env.prod file with ALL three passwords
          echo "Creating .env.prod file..."
          cat > .env.prod << 'EOF'
        DB_PASSWORD=$DB_PASSWORD
        REDIS_PASSWORD=$REDIS_PASSWORD
        JWT_SECRET_KEY=$JWT_SECRET_KEY
        EOF
          
          # Make sure file has correct permissions
          chmod 600 .env.prod
          
          # CRITICAL: Verify file was created and has content
          echo "Verifying .env.prod file..."
          if [ ! -f .env.prod ]; then
            echo "ERROR: .env.prod was not created!"
            exit 1
          fi
          
          echo "Contents of .env.prod:"
          cat .env.prod
          
          # Count variables
          VAR_COUNT=$(grep -c "=" .env.prod || true)
          if [ "$VAR_COUNT" -lt 3 ]; then
            echo "ERROR: .env.prod only has $VAR_COUNT variables, expected 3!"
            exit 1
          fi
          
          echo "✓ .env.prod file created with $(grep -c "=" .env.prod) variables"
          
          # Initialize or pull repo
          if [ -d .git ]; then
            echo "Pulling latest code..."
            git pull origin main || (git fetch origin && git reset --hard origin/main)
          else
            echo "Cloning repository..."
            git clone https://github.com/SaiPranay2011/InsightPulse.git .
          fi
          
          # Pull latest images
          echo "Pulling Docker images..."
          docker login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ghcr.io || true
          docker-compose -f docker-compose.prod.yml pull || true
          
          # Stop old services
          echo "Stopping old services..."
          docker-compose -f docker-compose.prod.yml down || true
          
          # CRITICAL: Source the .env.prod file and start services
          echo "Starting services with environment variables..."
          set -a
          source .env.prod
          set +a
          
          # Verify variables are loaded
          echo "Verifying environment variables are loaded..."
          if [ -z "$DB_PASSWORD" ]; then
            echo "ERROR: DB_PASSWORD not loaded!"
            exit 1
          fi
          if [ -z "$REDIS_PASSWORD" ]; then
            echo "ERROR: REDIS_PASSWORD not loaded!"
            exit 1
          fi
          if [ -z "$JWT_SECRET_KEY" ]; then
            echo "ERROR: JWT_SECRET_KEY not loaded!"
            exit 1
          fi
          echo "✓ All environment variables loaded successfully"
          
          # Start services
          docker-compose -f docker-compose.prod.yml up -d
          
          # Wait for services
          echo "Waiting for services to start and become healthy..."
          sleep 20
          
          # Check service health
          echo "Checking service status..."
          docker-compose -f docker-compose.prod.yml ps
          
          # Verify services are healthy
          POSTGRES_HEALTH=$(docker-compose -f docker-compose.prod.yml exec -T postgres pg_isready -U postgres 2>/dev/null || echo "not ready")
          REDIS_HEALTH=$(docker-compose -f docker-compose.prod.yml exec -T redis redis-cli ping 2>/dev/null || echo "not ready")
          
          echo "PostgreSQL health: $POSTGRES_HEALTH"
          echo "Redis health: $REDIS_HEALTH"
          
          # Run database migrations
          echo "Running database migrations..."
          docker-compose -f docker-compose.prod.yml exec -T api dotnet ef database update || echo "⚠ Migrations warning (may be first run)"
          
          echo ""
          echo "===== Deployment Complete ====="
          echo "Frontend: http://3.141.167.20:3000"
          echo "API: http://3.141.167.20:5228/api/health"
          echo "===== Deployment Complete ====="
        DEPLOY_SCRIPT